name: Build Testboxed Runtime 

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64

          - os: ubuntu-latest
            rid: linux-x64

          - os: ubuntu-latest
            rid: linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ru.tlpteam.tb.Runtime.csproj

      - name: Publish ${{ matrix.rid }}
        run: |
          dotnet publish ru.tlpteam.tb.Runtime.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PlatformTarget=AnyCPU \
            -o out/${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tb-runtime-${{ matrix.rid }}
          path: out/${{ matrix.rid }}
